# ── Database (Testcontainers PostgreSQL via DynamicPropertySource) ─────────────
# These values are overridden at runtime by IntegrationTestBase.overrideProperties()
# The placeholders here are just defaults — DynamicPropertySource takes priority.
spring.datasource.driver-class-name=org.postgresql.Driver

# Use 'none' so Hibernate doesn't try to validate/create schema —
# Flyway handles all DDL via migrations instead.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.validate-on-migrate=false

# ── Quartz (use RAM store — no DB needed in tests) ────────────────────────────
spring.quartz.job-store-type=memory
spring.quartz.auto-startup=false
spring.quartz.properties.org.quartz.scheduler.instanceName=ChronosSchedulerTest
spring.quartz.properties.org.quartz.scheduler.instanceId=NON_CLUSTERED
spring.quartz.properties.org.quartz.jobStore.isClustered=false

# ── Redis (overridden by DynamicPropertySource in IntegrationTestBase) ─────────
spring.data.redis.timeout=500ms
spring.data.redis.lettuce.pool.enabled=false

# ── OAuth2 (dummy values so Spring doesn't fail to start) ─────────────────────
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.github.client-id=test-github-id
spring.security.oauth2.client.registration.github.client-secret=test-github-secret

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.chronos=DEBUG
logging.level.org.flywaydb=INFO
logging.level.org.testcontainers=WARN
logging.level.com.github.dockerjava=WARN


chronos.retry.initial-delay-ms=100
chronos.retry.multiplier=2.0
chronos.retry.max-delay-ms=1000
chronos.notification.from-email=notifications@chronos.com
chronos.notification.enabled=false
spring.mail.host=localhost
spring.mail.port=1025