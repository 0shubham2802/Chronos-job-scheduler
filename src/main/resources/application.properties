
spring.application.name=chronos


spring.datasource.url=jdbc:postgresql://localhost:5432/chronos


spring.datasource.username=postgres
spring.datasource.password=postgres


spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=validate


spring.jpa.show-sql=true


spring.jpa.properties.hibernate.format_sql=true


spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.flyway.enabled=true


spring.flyway.locations=classpath:db/migration


spring.flyway.sql-migration-prefix=V


logging.level.com.chronos=DEBUG
logging.level.org.flywaydb=INFO


jwt.secret=chronos-super-secret-key-for-signing-jwt-tokens-must-be-long

jwt.expiration=900000
jwt.refresh-expiration=604800000

spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET

spring.security.oauth2.client.registration.google.scope=email,profile


spring.security.oauth2.client.registration.github.client-id=YOUR_GITHUB_CLIENT_ID
spring.security.oauth2.client.registration.github.client-secret=YOUR_GITHUB_CLIENT_SECRET
spring.security.oauth2.client.registration.github.scope=user:email


spring.flyway.baseline-on-migrate=true

spring.flyway.repair-on-migrate=true

spring.flyway.out-of-order=true
spring.flyway.validate-on-migrate=false


# ?? Quartz ????????????????????????????????????????????????????
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=never
spring.quartz.properties.org.quartz.scheduler.instanceName=ChronosScheduler
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO
spring.quartz.properties.org.quartz.jobStore.isClustered=true
spring.quartz.properties.org.quartz.jobStore.clusterCheckinInterval=10000
spring.quartz.properties.org.quartz.threadPool.threadCount=10

# ?? Redis ?????????????????????????????????????????????????????
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1

# ?? Retry configuration ???????????????????????????????????????
# Base wait time in milliseconds for first retry
chronos.retry.initial-delay-ms=1000
# Each retry doubles the wait: 1s ? 2s ? 4s ? 8s
chronos.retry.multiplier=2.0
# Absolute max wait between retries ? caps at 60 seconds
chronos.retry.max-delay-ms=60000

# ?? Email notifications ???????????????????????????????????????
# For testing use Mailhog (local) or Mailtrap (online fake SMTP)
# Replace with real SMTP for production
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Notification sender address
chronos.notification.from-email=notifications@chronos.com
chronos.notification.enabled=false

# ?? Actuator + Monitoring ?????????????????????????????????????
management.endpoints.web.exposure.include=health,prometheus,info,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
# Custom app info shown at /actuator/info
info.app.name=Chronos Job Scheduler
info.app.version=1.0.0
